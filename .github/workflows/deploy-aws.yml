name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Semantic version of the image already published to GHCR (e.g. 1.2.3)
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  packages: read

concurrency:
  group: deploy-aws-${{ github.repository }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit
