name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          BULLETS=$(git log --pretty=format:'- %s' "$RANGE" --no-merges | sort -u)

          {
            echo "## What's new in ${TAG}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "Highlights since ${PREV_TAG}:"
            else
              echo "Highlights:"
            fi
            echo ""
            echo "$BULLETS"
            echo ""
            echo "---"
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            --notes-file release-notes.md

  publish-image:
    needs: create-release
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.IMAGE_NAME || 'render-image' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: GHCR image name
        run: |
          echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lambda
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest

      - name: Save image tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker pull "$GHCR_IMAGE:$VERSION"
          docker save "$GHCR_IMAGE:$VERSION" | gzip > "${IMAGE_NAME}-lambda-${VERSION}.tar.gz"

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release upload "${{ github.ref_name }}" "${IMAGE_NAME}-lambda-${VERSION}.tar.gz" --repo "${{ github.repository }}"

  deploy:
    needs: publish-image
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME || 'render-image' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR image name
        run: |
          echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$IMAGE_NAME" --region "$AWS_REGION" \
            || aws ecr create-repository --repository-name "$IMAGE_NAME" --region "$AWS_REGION"

      - name: Pull from GHCR and push to Amazon ECR
        env:
          IMAGE_TAG: ${{ needs.publish-image.outputs.version }}
        run: |
          docker pull "$GHCR_IMAGE:$IMAGE_TAG"
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE_NAME}"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker tag "$GHCR_IMAGE:$IMAGE_TAG" "$ECR_URI:$IMAGE_TAG"
          docker push "$ECR_URI:$IMAGE_TAG"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "infrastructure/uv.lock"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-aws-cdk-2

      - name: Install CDK app dependencies
        working-directory: infrastructure
        run: uv sync

      - name: Look up ACM certificate for custom domain
        if: vars.HOSTED_ZONE_NAME != ''
        id: custom-domain
        run: |
          FQDN="api-${AWS_REGION}.${{ vars.HOSTED_ZONE_NAME }}"
          WILDCARD="*.${{ vars.HOSTED_ZONE_NAME }}"
          CERT_ARN=$(aws acm list-certificates \
            --query "CertificateSummaryList[?DomainName=='${FQDN}'].CertificateArn | [0]" \
            --output text)
          if [ "$CERT_ARN" = "None" ] || [ -z "$CERT_ARN" ]; then
            CERT_ARN=$(aws acm list-certificates \
              --query "CertificateSummaryList[?DomainName=='${WILDCARD}'].CertificateArn | [0]" \
              --output text)
          fi
          if [ "$CERT_ARN" != "None" ] && [ -n "$CERT_ARN" ]; then
            echo "cert_arn=${CERT_ARN}" >> "$GITHUB_OUTPUT"
            echo "hosted_zone_name=${{ vars.HOSTED_ZONE_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No ACM certificate found for ${FQDN} or ${WILDCARD} — skipping custom domain"
          fi

      - name: CDK deploy
        working-directory: infrastructure
        env:
          IMAGE_TAG: ${{ needs.publish-image.outputs.version }}
        run: |
          DOMAIN_ARGS=""
          if [ -n "${{ steps.custom-domain.outputs.cert_arn }}" ]; then
            DOMAIN_ARGS="-c hostedZoneName=${{ steps.custom-domain.outputs.hosted_zone_name }} -c certificateArn=${{ steps.custom-domain.outputs.cert_arn }}"
          fi
          npx aws-cdk@^2 deploy --require-approval never \
            -c usePrebuiltImage=true \
            -c "imageTag=${IMAGE_TAG}" \
            -c "imageName=${IMAGE_NAME}" \
            -c "stackName=${{ vars.STACK_NAME || 'RenderImageStack' }}" \
            -c "lambdaMemoryMb=${{ vars.LAMBDA_MEMORY_MB || '3008' }}" \
            -c "lambdaTimeoutSeconds=${{ vars.LAMBDA_TIMEOUT_SECONDS || '29' }}" \
            $DOMAIN_ARGS
