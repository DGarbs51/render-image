name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          BULLETS=$(git log --pretty=format:'- %s' "$RANGE" --no-merges | sort -u)

          {
            echo "## What's new in ${TAG}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "Highlights since ${PREV_TAG}:"
            else
              echo "Highlights:"
            fi
            echo ""
            echo "$BULLETS"
            echo ""
            echo "---"
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            --notes-file release-notes.md

  publish-image:
    needs: create-release
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.IMAGE_NAME || 'render-image' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: GHCR image name
        run: |
          echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lambda
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest

      - name: Save image tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker pull "$GHCR_IMAGE:$VERSION"
          docker save "$GHCR_IMAGE:$VERSION" | gzip > "${IMAGE_NAME}-lambda-${VERSION}.tar.gz"

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release upload "${{ github.ref_name }}" "${IMAGE_NAME}-lambda-${VERSION}.tar.gz" --repo "${{ github.repository }}"

  deploy:
    needs: publish-image
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      image_tag: ${{ needs.publish-image.outputs.version }}
    secrets: inherit
